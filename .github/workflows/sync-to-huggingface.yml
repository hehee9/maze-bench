name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Hugging Face Hub client
        run: python -m pip install --disable-pip-version-check "huggingface_hub>=1.0,<2"
      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: python
        run: |
          from huggingface_hub import HfApi

          HfApi().upload_folder(
              folder_path=".",
              repo_id="Hehee-dev/maze-bench",
              repo_type="space",
              ignore_patterns=[".github/**"],
              delete_patterns=["*"],
              commit_message="Sync from GitHub via GitHub Actions",
          )
