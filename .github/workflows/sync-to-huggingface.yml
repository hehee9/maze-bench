name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force "https://Hehee-dev:${HF_TOKEN}@huggingface.co/spaces/Hehee-dev/maze-bench" HEAD:main
