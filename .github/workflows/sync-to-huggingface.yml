name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
    paths-ignore:
      - images/maze-bench-model-ranking.png
      - images/maze-bench-leaderboard-size-scores.png
      - images/maze-bench-leaderboard-cost-performance.png
      - images/maze-bench-model-ranking-en.png
      - images/maze-bench-leaderboard-size-scores-en.png
      - images/maze-bench-leaderboard-cost-performance-en.png
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-to-huggingface-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dashboard export dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Export README images
        run: npm run export:readme-images
      - name: Commit updated README images
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -- \
            images/maze-bench-model-ranking.png \
            images/maze-bench-leaderboard-size-scores.png \
            images/maze-bench-leaderboard-cost-performance.png \
            images/maze-bench-model-ranking-en.png \
            images/maze-bench-leaderboard-size-scores-en.png \
            images/maze-bench-leaderboard-cost-performance-en.png
          if ! git diff --staged --quiet; then
            git commit -m "chore: refresh README images [skip ci]"
            git push
          fi
      - name: Install Hugging Face Hub client
        run: python -m pip install --disable-pip-version-check "huggingface_hub>=1.0,<2"
      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: python
        run: |
          from huggingface_hub import HfApi

          HfApi().upload_folder(
              folder_path=".",
              repo_id="Hehee-dev/maze-bench",
              repo_type="space",
              ignore_patterns=[".github/**", "node_modules/**", ".tmp/**"],
              delete_patterns=["*"],
              commit_message="Sync from GitHub via GitHub Actions",
          )
