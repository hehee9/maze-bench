<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title data-i18n="replay.documentTitle">Maze Bench Replay</title>
  <link rel="icon" href="data:,">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="site-header">
      <a
        class="site-brand"
        href="index.html"
        aria-label="Maze Bench 리플레이"
        data-i18n-aria-label="replay.brandLabel"
      >
        <p class="eyebrow">MAZE BENCH</p>
        <h1 data-i18n="replay.title">모델 이동 리플레이</h1>
      </a>
      <div class="header-actions">
        <div
          class="language-switch"
          role="group"
          aria-label="언어 선택"
          data-i18n-aria-label="common.language"
        >
          <button
            type="button"
            data-locale="ko"
            aria-label="한국어로 전환"
            data-i18n-aria-label="common.switchKorean"
          >KO</button>
          <button
            type="button"
            data-locale="en"
            aria-label="영어로 전환"
            data-i18n-aria-label="common.switchEnglish"
          >EN</button>
        </div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
          <span data-theme-icon aria-hidden="true">☾</span>
        </button>
        <nav
          class="site-nav"
          aria-label="페이지 이동"
          data-i18n-aria-label="common.pageNavigation"
        >
          <a href="leaderboard.html" data-i18n="common.leaderboard">리더보드</a>
          <a href="index.html" aria-current="page" data-i18n="common.replay">리플레이</a>
        </nav>
      </div>
    </header>

    <section
      class="control-panel"
      aria-label="리플레이 선택 및 재생 제어"
      data-i18n-aria-label="replay.controls"
    >
      <header class="control-panel-heading">
        <h2 data-i18n="replay.settings">리플레이 설정</h2>
        <button
          id="panelToggle"
          class="panel-toggle"
          type="button"
          aria-controls="controlContent"
          aria-expanded="true"
          aria-label="옵션 접기"
          title="옵션 접기"
          data-i18n-aria-label="replay.collapse"
          data-i18n-title="replay.collapse"
        >▴</button>
      </header>

      <div id="controlContent" class="control-content">
        <div class="selector-grid">
          <label class="field field-compact">
            <span data-i18n="common.mazeSize">미로 크기</span>
            <select id="sizeSelect"></select>
          </label>
          <label class="field">
            <span data-i18n="common.replay">리플레이</span>
            <select id="replaySelect"></select>
          </label>

          <section class="model-picker" aria-labelledby="modelPickerLabel">
            <div class="model-picker-heading">
              <span id="modelPickerLabel" data-i18n="replay.compareModels">모델 비교</span>
              <label class="overlay-toggle">
                <input id="optimalToggle" type="checkbox" disabled>
                <span data-i18n="replay.shortestPath">최단 경로</span>
              </label>
            </div>
            <label class="model-search">
              <span class="sr-only" data-i18n="replay.searchModel">모델 검색</span>
              <input
                id="modelSearch"
                type="search"
                placeholder="모델명 검색"
                data-i18n-placeholder="replay.searchPlaceholder"
                autocomplete="off"
                aria-controls="modelList"
              >
            </label>
            <div
              id="modelBulkControls"
              class="model-bulk-controls"
              aria-label="모델 일괄 선택"
              data-i18n-aria-label="replay.bulkSelection"
            >
              <button
                id="allModelsBulkButton"
                type="button"
                disabled
                data-i18n="selection.selectAll"
              >모두 선택</button>
              <details id="developerPicker" class="developer-picker" hidden>
                <summary
                  aria-label="개발사별 모델 선택"
                  data-i18n-aria-label="replay.developerSelection"
                >
                  <span class="developer-picker-symbol" aria-hidden="true">▦</span>
                  <span data-i18n="replay.developers">개발사</span>
                </summary>
                <div
                  id="developerBulkButtons"
                  class="developer-picker-popover"
                  role="group"
                  aria-label="개발사별 모델 선택"
                  data-i18n-aria-label="replay.developerSelection"
                ></div>
              </details>
            </div>
            <div
              id="modelList"
              class="model-list"
              aria-label="비교할 모델 선택"
              data-i18n-aria-label="replay.selectModels"
            ></div>
          </section>
        </div>

        <div class="result-control-row">
          <div class="result-strip" aria-live="polite">
            <div class="result-identity">
              <span
                id="outcomeBadge"
                class="badge badge-loading"
                data-i18n="common.loading"
              >불러오는 중</span>
              <strong id="activeModelName" data-i18n="replay.readingFile">결과 파일을 읽고 있습니다</strong>
            </div>
            <dl class="result-stats">
              <div>
                <dt data-i18n="common.score">점수</dt>
                <dd id="scoreValue">—</dd>
              </div>
              <div>
                <dt data-i18n="replay.executedMoves">실행 이동</dt>
                <dd id="executedValue">—</dd>
              </div>
              <div>
                <dt data-i18n="replay.optimalMoves">최단 이동</dt>
                <dd id="optimalValue">—</dd>
              </div>
            </dl>
          </div>

          <div class="transport">
            <label class="inline-field">
              <span data-i18n="replay.speed">속도</span>
              <select id="speedSelect">
                <option value="0.5">0.5×</option>
                <option value="1">1×</option>
                <option value="2" selected>2×</option>
                <option value="4">4×</option>
              </select>
            </label>

            <label class="inline-field step-field">
              <span data-i18n="replay.move">이동</span>
              <input id="stepInput" type="number" min="0" value="0" inputmode="numeric">
              <span id="stepTotal">/ 0</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="replay-panel">
      <div id="messageBox" class="message-box" role="alert" hidden></div>
      <div
        id="modelRouteTooltip"
        class="model-route-tooltip"
        role="tooltip"
        data-export-hide="true"
        hidden
      ></div>
      <div
        id="mazeStage"
        class="maze-stage"
        aria-label="미로 이동 경로"
        data-i18n-aria-label="replay.mazePath"
      >
        <span class="export-watermark maze-export-watermark" data-export-show="true">Github/hehee9</span>
        <button
          id="exportReplayButton"
          class="export-button maze-export-button"
          type="button"
          data-export-hide="true"
          data-export-target="#mazeStage"
          data-export-filename="maze-bench-replay.png"
          aria-label="이미지로 내보내기"
          title="이미지로 내보내기"
          data-i18n-aria-label="export.image"
          data-i18n-title="export.image"
        >
          <svg aria-hidden="true" focusable="false" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5" stroke-width="2"></circle>
            <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </button>
        <svg id="mazeSvg" role="img" aria-labelledby="mazeTitle mazeDescription">
          <title id="mazeTitle" data-i18n="replay.svgTitle">미로 리플레이</title>
          <desc id="mazeDescription" data-i18n="replay.svgDescription">미로의 벽, 출발점, 도착점과 현재까지 이동한 경로</desc>
          <g id="mazeLayer"></g>
          <g id="optimalLayer"></g>
          <g id="routeLayer"></g>
          <g id="markerLayer"></g>
        </svg>
      </div>
    </section>

    <section
      class="log-panel"
      aria-label="모델 이동 로그"
      data-i18n-aria-label="replay.movementLog"
    >
      <div class="log-heading">
        <div>
          <p class="eyebrow">MOVEMENT LOG</p>
          <h2 data-i18n="replay.commands">이동 명령</h2>
        </div>
        <div
          class="log-legend"
          aria-label="명령 색상 설명"
          data-i18n-aria-label="replay.commandColors"
        >
          <span><i class="legend-dot legend-current"></i><span data-i18n="replay.current">현재</span></span>
          <span><i class="legend-dot legend-death"></i><span data-i18n="common.collision">충돌</span></span>
          <span><i class="legend-dot legend-goal"></i><span data-i18n="replay.goal">도착</span></span>
          <span><i class="legend-dot legend-ignored"></i><span data-i18n="replay.ignored">종료 이후</span></span>
        </div>
        <div
          class="button-group log-controls"
          aria-label="재생 위치 제어"
          data-i18n-aria-label="replay.positionControls"
        >
          <button id="firstButton" type="button" aria-label="처음으로" title="처음으로" data-i18n-aria-label="replay.first" data-i18n-title="replay.first">|←</button>
          <button id="previousButton" type="button" aria-label="한 칸 뒤로" title="한 칸 뒤로" data-i18n-aria-label="replay.previous" data-i18n-title="replay.previous">←</button>
          <button
            id="playButton"
            class="button-primary"
            type="button"
            aria-label="자동 재생"
            aria-pressed="false"
            data-i18n-aria-label="replay.autoPlay"
          >▶ <span data-i18n="replay.play">재생</span></button>
          <button id="nextButton" type="button" aria-label="한 칸 앞으로" title="한 칸 앞으로" data-i18n-aria-label="replay.next" data-i18n-title="replay.next">→</button>
          <button id="lastButton" type="button" aria-label="마지막으로" title="마지막으로" data-i18n-aria-label="replay.last" data-i18n-title="replay.last">→|</button>
        </div>
      </div>

      <div class="log-row">
        <button id="logLeftButton" class="scroll-button" type="button" aria-label="로그를 왼쪽으로 이동" data-i18n-aria-label="replay.logLeft">‹</button>
        <div id="commandLogFrame" class="command-log-frame">
          <div id="commandLog" class="command-log" tabindex="0" aria-label="이동 명령 목록" data-i18n-aria-label="replay.commandList"></div>
        </div>
        <button id="logRightButton" class="scroll-button" type="button" aria-label="로그를 오른쪽으로 이동" data-i18n-aria-label="replay.logRight">›</button>
      </div>

      <label class="scrubber">
        <span class="sr-only" data-i18n="replay.position">재생 위치</span>
        <input id="stepRange" type="range" min="0" max="0" value="0">
      </label>
    </section>
  </main>

  <script src="i18n.js"></script>
  <script src="vendor/html-to-image/html-to-image.js"></script>
  <script src="export-image.js"></script>
  <script src="benchmark-data.js"></script>
  <script src="replay-core.js"></script>
  <script src="replay.js"></script>
</body>
</html>
